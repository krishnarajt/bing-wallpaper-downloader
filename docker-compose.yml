services:
  bing-wallpaper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bing-wallpaper
    restart: unless-stopped
    environment:
      TRIGGER_SCHEDULE: "${TRIGGER_SCHEDULE:-0 */6 * * *}"
      OUTPUT_DIR: /wallpapers
      MARKET: "${MARKET:-en-US}"
    volumes:
      - type: bind
        source: "${HOST_STORAGE_PATH:?Set HOST_STORAGE_PATH to an absolute host path}"
        target: /wallpapers
