name: Build and Push Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/bing-wallpaper-downloader:git-${{ github.sha }}
          
      # - run: |
      #     sed -i \
      #       "s|ghcr.io/.*/bing-wallpaper-downloader:[^ ]*|ghcr.io/${{ github.repository_owner }}/bing-wallpaper-downloader:git-${{ github.sha }}|" \
      #       k8s/base/deployment.yaml

      - run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git commit -m "chore(deploy): bing-wallpaper-downloader git-${{ github.sha }}"
          git push
