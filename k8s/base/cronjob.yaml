apiVersion: batch/v1
kind: CronJob
metadata:
  name: bing-wallpaper
spec:
  schedule: "0 */6 * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: bing-wallpaper
              image: ghcr.io/krishnarajt/bing-wallpaper-downloader:git-d6fcd409678c0519a2e02dce0488bcc3729e72c4
              imagePullPolicy: IfNotPresent
              env:
                - name: MARKET
                  value: "en-US"
                - name: OUTPUT_DIR
                  value: "/wallpapers"
              volumeMounts:
                - name: wallpaper-storage
                  mountPath: /wallpapers
          volumes:
            - name: wallpaper-storage
              hostPath:
                path: /srv/bing-wallpaper
                type: DirectoryOrCreate
